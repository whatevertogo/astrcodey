[workspace]
resolver = "2"
default-members = ["crates/astrcode-cli"]
members = [
    "crates/astrcode-core",
    "crates/astrcode-support",
    "crates/astrcode-ai",
    "crates/astrcode-tools",
    "crates/astrcode-storage",
    "crates/astrcode-context",
    "crates/astrcode-session",
    "crates/astrcode-extensions",
    "crates/astrcode-bundled-extensions",
    "crates/astrcode-server",
    "crates/astrcode-protocol",
    "crates/astrcode-client",
    "crates/astrcode-cli",
    "crates/astrcode-log",
    "crates/astrcode-extension-agent-tools",
    "crates/astrcode-extension-mcp",
    "crates/astrcode-extension-skill",
    "crates/astrcode-extension-todo-tool",
    "crates/astrcode-extension-mode",
    "crates/astrcode-eval",
    "src-tauri",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
dirs = "6"
fs2 = "0.4"
futures = "0.3"
futures-util = "0.3"
parking_lot = "0.12"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
serde_yaml = "0.9"
tempfile = "3"
tokio-util = "0.7"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
