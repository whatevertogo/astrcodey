[workspace]
resolver = "2"
default-members = ["crates/astrcode-cli"]
members = [
    "crates/astrcode-core",
    "crates/astrcode-support",
    "crates/astrcode-ai",
    "crates/astrcode-prompt",
    "crates/astrcode-tools",
    "crates/astrcode-storage",
    "crates/astrcode-context",
    "crates/astrcode-extensions",
    "crates/astrcode-server",
    "crates/astrcode-protocol",
    "crates/astrcode-client",
    "crates/astrcode-cli",
    "crates/astrcode-extension-agent-tools",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
