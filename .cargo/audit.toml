# Workspace security audit policy (CI: `cargo audit`).
#
# wasmtime / wasmtime-wasi: pinned in root Cargo.toml workspace.dependencies (>=44.0.2).
# Desktop (Tauri/Wry on Linux) still pulls GTK3 bindings marked unmaintained by RustSec;
# those are transitive and accepted until the Tauri stack upgrades.

[advisories]
ignore = [
    # gtk-rs GTK3 (Tauri desktop / Linux only)
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0429",
    # unic-* via tauri-utils / urlpattern
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]
