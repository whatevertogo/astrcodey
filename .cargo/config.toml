[build]
# Incremental compilation for debug builds (faster iteration).
# Release builds disable this via Cargo.toml profile settings.
incremental = true

[term]
# Forward-colored diagnostics to CI logs
color = "always"

# Use a faster linker on Linux
[target.x86_64-unknown-linux-gnu]
linker = "gcc"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
