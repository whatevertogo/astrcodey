[package]
name = "s5r-guest-demo"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[[bin]]
name = "s5r_guest_demo"
path = "src/main.rs"

[dependencies]
astrcode-extension-sdk = { path = "../../../astrcode-extension-sdk" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
