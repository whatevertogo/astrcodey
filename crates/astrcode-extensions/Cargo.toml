[package]
name = "astrcode-extensions"
version = "0.1.0"
edition = "2021"
description = "Extension/hook system: lifecycle events, hook modes, extension loading and dispatch"

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-support = { path = "../astrcode-support" }
astrcode-extension-agent-tools = { path = "../astrcode-extension-agent-tools", default-features = false }
astrcode-extension-mcp = { path = "../astrcode-extension-mcp", default-features = false }
astrcode-extension-skill = { path = "../astrcode-extension-skill", default-features = false }
astrcode-extension-todo-tool = { path = "../astrcode-extension-todo-tool", default-features = false }
astrcode-extension-mode = { path = "../astrcode-extension-mode", default-features = false }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
dirs = { workspace = true }
parking_lot = { workspace = true }
wasmtime = { version = "43", default-features = false, features = ["cranelift", "runtime"] }

[dev-dependencies]
wasm-encoder = "0.245"
tempfile = { workspace = true }
