[package]
name = "astrcode-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Backend server: session manager, agent loop, HTTP/SSE + ACP WebSocket API, config service"

[[bin]]
name = "astrcode-http-server"
path = "src/main.rs"

[features]
# 启用测试辅助路径：内存事件存储 + bootstrap_with 的测试起动模式。
# 仅应用于集成测试，不应进入生产二进制。
testing = ["astrcode-storage/testing"]

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-support = { path = "../astrcode-support" }
astrcode-protocol = { path = "../astrcode-protocol" }
astrcode-ai = { path = "../astrcode-ai" }
astrcode-tools = { path = "../astrcode-tools" }
astrcode-storage = { path = "../astrcode-storage" }
astrcode-context = { path = "../astrcode-context" }
astrcode-session = { path = "../astrcode-session" }
astrcode-extensions = { path = "../astrcode-extensions" }
astrcode-bundled-extensions = { path = "../astrcode-bundled-extensions" }
astrcode-log = { path = "../astrcode-log" }
tokio = { workspace = true, features = ["sync", "time", "fs", "net", "rt-multi-thread", "macros", "process", "io-util"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }
axum = { workspace = true, features = ["ws"] }
futures-util = { workspace = true }
tokio-util = { workspace = true }
tower-http = { workspace = true }
getrandom = { workspace = true }
uuid = { workspace = true }
agent-client-protocol = { workspace = true }

[[test]]
name = "http_routes"
required-features = ["testing"]

[dev-dependencies]
http-body-util = { workspace = true }
tower = { workspace = true }
astrcode-session = { path = "../astrcode-session", features = ["test-fixtures"] }
astrcode-extension-skill = { path = "../astrcode-extension-skill", default-features = false }
# 测试时启用内存存储；Cargo 会把 testing feature 合并到正常依赖里，
# 使 #[cfg(test)] 块和 tests/ 里的集成测试都能访问 in_memory 模块。
astrcode-storage = { path = "../astrcode-storage", features = ["testing"] }
