[package]
name = "astrcode-server"
version = "0.1.0"
edition = "2021"
description = "Backend server: session manager, agent loop, JSON-RPC handler, config service"

[[bin]]
name = "astrcode-server"
path = "src/main.rs"

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-support = { path = "../astrcode-support" }
astrcode-protocol = { path = "../astrcode-protocol" }
astrcode-ai = { path = "../astrcode-ai" }
astrcode-tools = { path = "../astrcode-tools" }
astrcode-storage = { path = "../astrcode-storage" }
astrcode-context = { path = "../astrcode-context" }
astrcode-extensions = { path = "../astrcode-extensions" }
astrcode-extension-agent-tools = { path = "../astrcode-extension-agent-tools", default-features = false }
astrcode-extension-todo-tool = { path = "../astrcode-extension-todo-tool", default-features = false }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
astrcode-log = { path = "../astrcode-log" }
notify = "7"
