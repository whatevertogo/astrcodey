[package]
name = "astrcode-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Built-in tools: file ops, shell execution, agent collaboration, event emission"

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-support = { path = "../astrcode-support" }
tokio = { workspace = true, features = ["sync", "time", "rt-multi-thread", "macros", "process", "io-util"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true }
base64 = { workspace = true }
globset = { workspace = true }
sha2 = { workspace = true }
ignore = { workspace = true }
regex = { workspace = true }
similar = { workspace = true }
tracing = { workspace = true }
grep-searcher = { workspace = true }
grep-regex = { workspace = true }
portable-pty = { workspace = true }
parking_lot = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }
