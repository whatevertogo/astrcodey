description = "Wire protocol: JSON-RPC 2.0 types, commands, events, UI sub-protocol"

[features]
typescript = ["dep:ts-rs"]

[dependencies]
astrcode-core = { path = "../astrcode-core" }
serde = { workspace = true }
serde_json = { workspace = true }
