[package]
name = "astrcode-session"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Session runtime: Session handle, turn execution, and event bus"

[features]
test-fixtures = []

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-context = { path = "../astrcode-context" }
astrcode-extensions = { path = "../astrcode-extensions" }
astrcode-tools = { path = "../astrcode-tools" }
astrcode-storage = { path = "../astrcode-storage" }
astrcode-support = { path = "../astrcode-support" }
arc-swap = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
parking_lot = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt-multi-thread", "macros"] }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
astrcode-ai = { path = "../astrcode-ai" }
astrcode-storage = { path = "../astrcode-storage", features = ["testing"] }
