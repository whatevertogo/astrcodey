[package]
name = "astrcode-extension-agent-tools"
version = "0.1.0"
edition = "2021"
description = "Subagent delegation and task management extension (cdylib)"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid = { version = "1", features = ["v4"] }
