[package]
name = "astrcode-storage"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Session persistence: JSONL event log, snapshots, file locking, config storage"

[features]
# 启用纯内存事件存储实现，用于集成测试和测试辅助启动路径。
# 不应在生产构建中启用。
testing = []

[dependencies]
astrcode-core = { path = "../astrcode-core" }
astrcode-support = { path = "../astrcode-support" }
tokio = { workspace = true, features = ["fs", "rt-multi-thread", "macros"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt-multi-thread", "macros"] }
