# cargo-deny policy — run: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Desktop (Tauri) 与主 CLI/server 构建分离；CI clippy/test 亦 exclude。
exclude = ["astrcode-desktop"]

[advisories]
version = 2
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "parquet 59 depends on paste; no safe upstream upgrade is available yet" },
]

[licenses]
version = 2
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unlicense",
    "BSL-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
