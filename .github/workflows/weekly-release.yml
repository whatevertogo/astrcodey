name: Weekly Release

on:
  schedule:
    # 每周一 UTC 08:00（北京时间 16:00）
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type (patch/minor/major)"
        required: false
        default: "patch"

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare weekly release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Check for changes since last release
        id: check
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag found, will create first release"
          else
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            echo "Commits since ${LAST_TAG}: ${COMMITS}"
            if [ "$COMMITS" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No changes since last release, skipping"
            fi
          fi

      - name: Calculate next version
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          LAST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)
          if [ -z "$LAST_TAG" ]; then
            NEW_VERSION="0.1.0"
          else
            CURRENT="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$BUMP" in
              major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
              *) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEW_VERSION} (bump: ${BUMP})"

      - name: Bump release metadata
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          bash scripts/bump-release-version.sh "${VERSION}"
          cargo check --workspace --exclude astrcode-desktop

      - name: Generate release notes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          LAST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)

          {
            echo "## $TAG"
            echo ""
            echo "Released: $(date -u +%Y-%m-%d)"
            echo ""

            # Features
            FEATURES=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%s (%h)" --no-merges | grep -iE '^feat' || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEATURES" | sed 's/^/- /'
              echo ""
            fi

            # Fixes
            FIXES=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%s (%h)" --no-merges | grep -iE '^fix' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi

            # Refactors
            REFACTORS=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%s (%h)" --no-merges | grep -iE '^refactor' || true)
            if [ -n "$REFACTORS" ]; then
              echo "### 🔧 Refactors"
              echo ""
              echo "$REFACTORS" | sed 's/^/- /'
              echo ""
            fi

            # Other
            OTHER=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%s (%h)" --no-merges | grep -viE '^(feat|fix|refactor|chore|docs|ci|test|style)' || true)
            if [ -n "$OTHER" ]; then
              echo "### 📝 Other"
              echo ""
              echo "$OTHER" | sed 's/^/- /'
              echo ""
            fi

            # PR list
            PRS=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%s" --merges | grep -oP '#\d+' | sort -u || true)
            if [ -n "$PRS" ]; then
              echo "### Pull Requests"
              echo ""
              echo "$PRS" | while read pr; do
                echo "- ${pr}"
              done
              echo ""
            fi

            # Contributors
            CONTRIBUTORS=$(git log "${LAST_TAG:+${LAST_TAG}..}HEAD" --pretty=format:"%an" | sort -u)
            if [ -n "$CONTRIBUTORS" ]; then
              echo "### Contributors"
              echo ""
              echo "$CONTRIBUTORS" | sed 's/^/- @/'
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Install:** \`npm install -g @whatevertogo/astrcode@${TAG#v}\`"
          } > release-notes.md

          cat release-notes.md

      - name: Create and push tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${TAG#v}" || echo "No changes to commit"
          git tag -a "$TAG" -m "Release $TAG" -m "$(cat release-notes.md)"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "$TAG"

  publish-release:
    name: Build and publish release
    needs: prepare-release
    if: needs.prepare-release.outputs.has_changes == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
    secrets: inherit
